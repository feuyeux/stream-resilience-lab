name: Build Desktop App

on:
  push:
    tags:
      - 'v*.*.*'  # 触发条件: 推送版本标签如 v1.0.0
      - 'srl-*'   # 或自定义标签如 srl-20260626
  workflow_dispatch:  # 允许手动触发
    inputs:
      version:
        description: 'Build version (e.g., srl-1.0.0)'
        required: false
        default: ''

jobs:
  build-windows:
    name: Build Windows
    runs-on: windows-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Set build version
        shell: pwsh
        run: |
          if ("${{ github.event.inputs.version }}" -ne "") {
            echo "SRL_BUILD_VERSION=${{ github.event.inputs.version }}" >> $env:GITHUB_ENV
          } elseif ("${{ github.ref }}" -match "refs/tags/(.+)") {
            $tag = $matches[1]
            echo "SRL_BUILD_VERSION=$tag" >> $env:GITHUB_ENV
          }
      
      - name: Build Windows installer
        run: npm run desktop:dist:win
      
      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: |
            dist/packages/*.exe
            dist/packages/*.exe.blockmap
          retention-days: 30

  build-macos:
    name: Build macOS
    runs-on: macos-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Set build version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            echo "SRL_BUILD_VERSION=${{ github.event.inputs.version }}" >> $GITHUB_ENV
          elif [[ "${{ github.ref }}" =~ refs/tags/(.+) ]]; then
            echo "SRL_BUILD_VERSION=${BASH_REMATCH[1]}" >> $GITHUB_ENV
          fi
      
      - name: Build macOS DMG
        run: npm run desktop:dist:mac
      
      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-installer
          path: |
            dist/packages/*.dmg
            dist/packages/*.dmg.blockmap
          retention-days: 30

  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Set build version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            echo "SRL_BUILD_VERSION=${{ github.event.inputs.version }}" >> $GITHUB_ENV
          elif [[ "${{ github.ref }}" =~ refs/tags/(.+) ]]; then
            echo "SRL_BUILD_VERSION=${BASH_REMATCH[1]}" >> $GITHUB_ENV
          fi
      
      - name: Build Linux packages
        run: npm run desktop:dist:linux
      
      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-installers
          path: |
            dist/packages/*.AppImage
            dist/packages/*.deb
          retention-days: 30

  create-release:
    name: Create GitHub Release
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    
    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      
      - name: Display structure of downloaded files
        run: ls -R artifacts
      
      - name: Extract version from tag
        id: version
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"
      
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          name: Release ${{ steps.version.outputs.version }}
          draft: false
          prerelease: ${{ contains(steps.version.outputs.version, 'beta') || contains(steps.version.outputs.version, 'alpha') }}
          generate_release_notes: true
          files: |
            artifacts/windows-installer/*.exe
            artifacts/macos-installer/*.dmg
            artifacts/linux-installers/*.AppImage
            artifacts/linux-installers/*.deb
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Upload to release assets
        run: |
          echo "Release created successfully!"
          echo "Download artifacts from: ${{ github.server_url }}/${{ github.repository }}/releases/tag/${{ steps.version.outputs.version }}"
