name: CI

on:
  pull_request:
    branches: [main, master, develop]
  workflow_dispatch:  # 允许手动触发

jobs:
  test:
    name: Test & Typecheck
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run typecheck
        run: npm run typecheck
      
      - name: Run tests
        run: npm test
      
      - name: Run smoke tests
        run: npm run resilience:smoke
        timeout-minutes: 5

  build-check:
    name: Build Check (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build desktop renderer
        run: npm run desktop:build
      
      - name: Verify build output
        shell: bash
        run: |
          if [ ! -d "dist/desktop-renderer" ]; then
            echo "Error: dist/desktop-renderer not found"
            exit 1
          fi
          echo "Build output verified"
