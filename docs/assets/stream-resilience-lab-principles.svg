<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Stream Resilience Lab technical principles poster</title>
  <desc id="desc">A technical architecture poster showing how resilience-runner sends SDK requests to fault-provider, how the server mocks protocol failures, and how the client records resilience outcomes.</desc>
  <defs>
    <style>
      .bg { fill: #f8fafc; }
      .title { font: 800 54px Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 400 24px Arial, sans-serif; fill: #475569; }
      .section-title { font: 800 28px Arial, sans-serif; fill: #0f172a; }
      .section-note { font: 600 18px Arial, sans-serif; fill: #475569; }
      .box-title { font: 800 22px Arial, sans-serif; fill: #111827; }
      .box-text { font: 400 18px Arial, sans-serif; fill: #334155; }
      .label { font: 800 18px Arial, sans-serif; fill: #ffffff; }
      .dark-label { font: 800 18px Arial, sans-serif; fill: #334155; }
      .small { font: 700 15px Arial, sans-serif; fill: #334155; }
      .tiny { font: 600 14px Arial, sans-serif; fill: #475569; }
      .step-num { font: 900 22px Arial, sans-serif; fill: #ffffff; }
      .step-text { font: 800 17px Arial, sans-serif; fill: #0f172a; }
      .card { fill: #ffffff; stroke: #cbd5e1; stroke-width: 2; rx: 18; }
      .client-panel { fill: #eff6ff; stroke: #60a5fa; stroke-width: 3; rx: 24; }
      .server-panel { fill: #fff7ed; stroke: #fb923c; stroke-width: 3; rx: 24; }
      .report-panel { fill: #ecfdf5; stroke: #34d399; stroke-width: 3; rx: 20; }
      .fault-panel { fill: #fef2f2; stroke: #f87171; stroke-width: 3; rx: 20; }
      .arrow { stroke: #334155; stroke-width: 5; fill: none; marker-end: url(#arrow); }
      .soft-arrow { stroke: #64748b; stroke-width: 4; fill: none; marker-end: url(#arrow-soft); stroke-dasharray: 10 10; }
      .blue { fill: #2563eb; }
      .orange { fill: #ea580c; }
      .green { fill: #059669; }
      .red { fill: #dc2626; }
      .slate { fill: #475569; }
      .line { stroke: #cbd5e1; stroke-width: 2; }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
    <marker id="arrow-soft" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
  </defs>

  <rect class="bg" width="1600" height="900"/>
  <circle cx="1390" cy="85" r="58" fill="#dbeafe"/>
  <circle cx="1470" cy="145" r="34" fill="#fed7aa"/>
  <circle cx="1285" cy="130" r="26" fill="#bbf7d0"/>

  <text x="70" y="78" class="title">Stream Resilience Lab</text>
  <text x="74" y="116" class="subtitle">Official SDK client resilience against mocked OpenAI and Anthropic streaming failures</text>

  <g transform="translate(70 160)">
    <rect x="0" y="0" width="1460" height="104" rx="22" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
    <text x="24" y="37" class="section-note">Flow order</text>
    <g transform="translate(24 52)">
      <circle cx="18" cy="18" r="18" class="slate"/><text x="12" y="26" class="step-num">1</text><text x="50" y="24" class="step-text">Query</text>
      <line x1="116" y1="18" x2="176" y2="18" class="line"/>
      <circle cx="208" cy="18" r="18" class="blue"/><text x="202" y="26" class="step-num">2</text><text x="240" y="24" class="step-text">SDK</text>
      <line x1="300" y1="18" x2="360" y2="18" class="line"/>
      <circle cx="392" cy="18" r="18" class="blue"/><text x="386" y="26" class="step-num">3</text><text x="424" y="24" class="step-text">Request</text>
      <line x1="518" y1="18" x2="578" y2="18" class="line"/>
      <circle cx="610" cy="18" r="18" class="orange"/><text x="604" y="26" class="step-num">4</text><text x="642" y="24" class="step-text">Scenario</text>
      <line x1="752" y1="18" x2="812" y2="18" class="line"/>
      <circle cx="844" cy="18" r="18" class="orange"/><text x="838" y="26" class="step-num">5</text><text x="876" y="24" class="step-text">Stream</text>
      <line x1="968" y1="18" x2="1028" y2="18" class="line"/>
      <circle cx="1060" cy="18" r="18" class="green"/><text x="1054" y="26" class="step-num">6</text><text x="1092" y="24" class="step-text">Policy</text>
      <line x1="1180" y1="18" x2="1240" y2="18" class="line"/>
      <circle cx="1272" cy="18" r="18" class="green"/><text x="1266" y="26" class="step-num">7</text><text x="1304" y="24" class="step-text">Report</text>
    </g>
  </g>

  <g transform="translate(70 304)">
    <rect class="client-panel" x="0" y="0" width="680" height="476"/>
    <text x="32" y="50" class="section-title">Client side: resilience-runner</text>
    <text x="34" y="82" class="section-note">Minimal SDK client. No agent logic.</text>
    <rect x="442" y="60" width="178" height="36" rx="18" fill="#dbeafe" stroke="#93c5fd"/>
    <text x="462" y="84" class="small">Official SDK surface</text>

    <rect class="card" x="34" y="112" width="276" height="92"/>
    <text x="58" y="145" class="box-title">CLI Input</text>
    <text x="58" y="175" class="box-text">query, protocol, scenario</text>

    <rect class="card" x="370" y="112" width="276" height="126"/>
    <text x="394" y="145" class="box-title">SDK Runner</text>
    <text x="394" y="176" class="box-text">OpenAI Chat / Responses</text>
    <text x="394" y="205" class="box-text">Anthropic Messages</text>

    <rect class="card" x="34" y="288" width="276" height="132"/>
    <text x="58" y="321" class="box-title">Resilience Policy</text>
    <text x="58" y="352" class="box-text">retry before partial output</text>
    <text x="58" y="381" class="box-text">abort hangs with timeout</text>
    <text x="58" y="410" class="box-text">safe-fail bad tool JSON</text>

    <rect class="report-panel" x="370" y="288" width="276" height="132"/>
    <text x="394" y="321" class="box-title">Reports</text>
    <text x="394" y="352" class="box-text">terminal result</text>
    <text x="394" y="381" class="box-text">JSON details</text>
    <text x="394" y="410" class="box-text">smoke Markdown summary</text>

    <path class="arrow" d="M310 158 H358"/>
    <path class="arrow" d="M508 238 V276"/>
    <path class="arrow" d="M310 354 H358"/>
    <path class="soft-arrow" d="M172 204 V276"/>
  </g>

  <g transform="translate(850 304)">
    <rect class="server-panel" x="0" y="0" width="680" height="476"/>
    <text x="32" y="50" class="section-title">Server side: fault-provider</text>
    <text x="34" y="82" class="section-note">Mock inference service. No real LLM calls.</text>
    <rect x="464" y="30" width="154" height="36" rx="18" fill="#ffedd5" stroke="#fdba74"/>
    <text x="489" y="54" class="small">Protocol mock</text>

    <rect class="card" x="34" y="112" width="276" height="132"/>
    <text x="58" y="145" class="box-title">Protocol Endpoints</text>
    <text x="58" y="176" class="box-text">/v1/chat/completions</text>
    <text x="58" y="205" class="box-text">/v1/responses</text>
    <text x="58" y="234" class="box-text">/v1/messages</text>

    <rect class="card" x="370" y="112" width="276" height="132"/>
    <text x="394" y="145" class="box-title">Scenario Engine</text>
    <text x="394" y="176" class="box-text">normal, rate limit</text>
    <text x="394" y="205" class="box-text">midstream close</text>
    <text x="394" y="234" class="box-text">silent hang</text>

    <rect class="card" x="34" y="292" width="276" height="116"/>
    <text x="58" y="325" class="box-title">Protocol Adapters</text>
    <text x="58" y="356" class="box-text">OpenAI-shaped chunks</text>
    <text x="58" y="385" class="box-text">Anthropic-shaped events</text>

    <rect class="fault-panel" x="370" y="292" width="276" height="116"/>
    <text x="394" y="325" class="box-title">Fault Output</text>
    <text x="394" y="356" class="box-text">valid / malformed SSE</text>
    <text x="394" y="385" class="box-text">socket close, delay, 429/529</text>

    <path class="arrow" d="M310 178 H358"/>
    <path class="arrow" d="M508 244 V280"/>
    <path class="arrow" d="M310 350 H358"/>
  </g>

  <path class="arrow" d="M716 456 C772 424, 806 424, 862 456"/>
  <text x="730" y="407" class="dark-label">OpenAI or Anthropic request</text>
  <rect x="640" y="432" width="170" height="34" rx="17" class="blue"/>
  <text x="660" y="455" class="label">SDK request</text>

  <path class="arrow" d="M1188 760 C1084 838, 515 838, 415 760"/>
  <rect x="676" y="805" width="244" height="38" rx="19" class="green"/>
  <text x="697" y="830" class="label">deltas, errors, aborts</text>

  <g transform="translate(70 812)">
    <rect x="0" y="0" width="430" height="54" rx="18" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
    <circle cx="28" cy="27" r="12" class="red"/>
    <text x="52" y="33" class="tiny">Failure modes are controlled and repeatable for simple verification.</text>
  </g>
  <g transform="translate(1080 812)">
    <rect x="0" y="0" width="450" height="54" rx="18" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
    <circle cx="28" cy="27" r="12" class="green"/>
    <text x="52" y="33" class="tiny">Reports record the problem, mitigation, and observed SDK behavior.</text>
  </g>
</svg>
